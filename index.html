<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Oficina Grupo Mandre • POS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; background: #F8F1E9; }
    .mesa {
      transition: all 0.3s ease;
    }
    .mesa:hover { transform: scale(1.08); }
    .mesa-libre { background: #ECFDF5; border-color: #10B981; color: #065F46; }
    .mesa-ocupada { background: #FEE2E2; border-color: #EF4444; color: #991B1B; }
    .modal { animation: modalEnter 0.4s ease-out; }
    @keyframes modalEnter {
      from { opacity: 0; transform: scale(0.9) translateY(30px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body>

  <header class="bg-[#3E2723] text-white py-5 px-6 flex justify-between items-center shadow-xl">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-[#8FBC8F] rounded-2xl flex items-center justify-center text-2xl">☕</div>
      <h1 class="text-3xl font-bold tracking-tighter">LA OFICINA</h1>
    </div>
    <button onclick="openAdmin()" class="px-6 py-3 bg-white/10 hover:bg-white/20 rounded-3xl text-sm font-medium">⚙️ Admin</button>
  </header>

  <div class="max-w-7xl mx-auto p-6">
    <!-- Tabs de Zonas -->
    <div class="flex gap-2 mb-8 border-b pb-2">
      <button onclick="showZone('terraza')" id="tab-terraza" class="tab-btn px-8 py-3 rounded-3xl font-medium active">🌳 Terraza</button>
      <button onclick="showZone('interior')" id="tab-interior" class="tab-btn px-8 py-3 rounded-3xl font-medium">🏠 Interior</button>
      <button onclick="showZone('barra')" id="tab-barra" class="tab-btn px-8 py-3 rounded-3xl font-medium">🍷 Barra</button>
    </div>

    <!-- Contenedores de Mesas -->
    <div id="zona-terraza" class="grid grid-cols-3 md:grid-cols-6 gap-6"></div>
    <div id="zona-interior" class="grid grid-cols-3 md:grid-cols-6 gap-6 hidden"></div>
    <div id="zona-barra" class="grid grid-cols-3 md:grid-cols-6 gap-6 hidden"></div>
  </div>

  <!-- ====================== MODAL PEDIDO ====================== -->
  <div id="order-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 modal">
    <div class="bg-white w-full max-w-4xl rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[95vh]">
      <div class="bg-[#3E2723] text-white px-8 py-6 flex justify-between">
        <h2 id="modal-table-name" class="text-4xl font-bold"></h2>
        <button onclick="closeModal()" class="text-4xl">×</button>
      </div>

      <div class="flex flex-1 overflow-hidden">
        <div class="w-1/2 border-r p-6 overflow-auto bg-gray-50">
          <input id="product-search" onkeyup="filterProducts()" placeholder="Buscar producto..." 
                 class="w-full px-5 py-4 border rounded-3xl mb-6">
          <div id="products-grid" class="grid grid-cols-2 gap-4"></div>
        </div>

        <div class="w-1/2 p-6 flex flex-col">
          <h3 class="font-semibold mb-4">Pedido Actual</h3>
          <div id="order-list" class="flex-1 overflow-auto space-y-3"></div>
          <div class="mt-auto pt-6 border-t text-3xl font-bold flex justify-between">
            <span>Total:</span>
            <span id="total-amount">$0</span>
          </div>
        </div>
      </div>

      <div class="p-6 grid grid-cols-2 md:grid-cols-5 gap-3 bg-gray-50 border-t">
        <button onclick="guardarMesa()" class="py-6 bg-amber-500 text-white rounded-3xl font-semibold">💾 Guardar Mesa</button>
        <button onclick="limpiarPedido()" class="py-6 border border-gray-300 rounded-3xl font-medium">Limpiar</button>
        <button onclick="cerrarMesa('Efectivo')" class="py-6 bg-emerald-600 text-white rounded-3xl font-semibold">💵 Efectivo</button>
        <button onclick="cerrarMesa('QR')" class="py-6 bg-blue-600 text-white rounded-3xl font-semibold">📱 QR</button>
        <button onclick="cerrarMesa('Datafono')" class="py-6 bg-purple-600 text-white rounded-3xl font-semibold">💳 Datafono</button>
      </div>
    </div>
  </div>

  <!-- ADMIN MODAL (con contraseña) -->
  <div id="admin-modal" class="hidden fixed inset-0 bg-black/70 z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl p-8 w-full max-w-md">
      <h2 class="text-2xl font-bold mb-6 text-center">Acceso Administrador</h2>
      <input id="admin-pass" type="password" placeholder="Contraseña" class="w-full p-4 border rounded-3xl mb-6">
      <button onclick="checkAdminPassword()" class="w-full py-4 bg-[#3E2723] text-white rounded-3xl font-medium">Entrar</button>
    </div>
  </div>

  <!-- HISTORIAL VENTAS -->
  <div id="ventas-modal" class="hidden fixed inset-0 bg-black/70 z-[110] flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl p-8 w-full max-w-3xl max-h-[90vh] overflow-auto">
      <h2 class="text-2xl font-bold mb-6">Historial de Ventas</h2>
      <div id="ventas-list" class="space-y-4"></div>
      <button onclick="closeVentasModal()" class="mt-6 w-full py-4 border rounded-3xl">Cerrar</button>
    </div>
  </div>

  <script>
    // Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBzsRQKBh-_P_S8s-4n5qTPYFGbiM_T6OY",
      authDomain: "la-oficina-grupo-mandre.firebaseapp.com",
      projectId: "la-oficina-grupo-mandre",
      storageBucket: "la-oficina-grupo-mandre.firebasestorage.app",
      messagingSenderId: "839406353836",
      appId: "1:839406353836:web:c7df84a66f37ab28e7ce09"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentTable = null;
    let order = [];
    let allProducts = [];
    let currentZone = 'terraza';

    async function initTables() {
      let snap = await db.collection("tables").get();
      if (snap.empty) {
        const inicial = [
          ...Array.from({length:6}, (_,i) => ({id:`T${i+1}`, zone:"terraza", status:"libre", total:0, items:[]})),
          ...Array.from({length:3}, (_,i) => ({id:`I${i+1}`, zone:"interior", status:"libre", total:0, items:[]})),
          ...Array.from({length:3}, (_,i) => ({id:`B${i+1}`, zone:"barra", status:"libre", total:0, items:[]}))
        ];
        for (let t of inicial) await db.collection("tables").doc(t.id).set(t);
      }
      showZone('terraza');
    }

    async function showZone(zone) {
      currentZone = zone;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active', 'bg-[#3E2723]', 'text-white'));
      document.getElementById(`tab-${zone}`).classList.add('active', 'bg-[#3E2723]', 'text-white');

      document.getElementById('zona-terraza').classList.add('hidden');
      document.getElementById('zona-interior').classList.add('hidden');
      document.getElementById('zona-barra').classList.add('hidden');
      document.getElementById(`zona-${zone}`).classList.remove('hidden');

      const snap = await db.collection("tables").get();
      const tables = snap.docs.map(d => ({id: d.id, ...d.data()}));
      renderZone(zone, tables);
    }

    function renderZone(zone, tables) {
      const cont = document.getElementById(`zona-${zone}`);
      cont.innerHTML = "";
      tables.filter(t => t.zone === zone).forEach(table => {
        const div = document.createElement('div');
        div.className = `mesa aspect-square rounded-3xl flex flex-col items-center justify-center cursor-pointer border-4 text-center
          ${table.status === 'libre' ? 'mesa-libre' : 'mesa-ocupada'}`;
        div.innerHTML = `
          <span class="text-5xl font-bold">${table.id}</span>
          ${table.total > 0 ? `<span class="text-xl font-semibold mt-2">$${table.total}</span>` : ''}
        `;
        div.onclick = () => openOrderModal(table);
        cont.appendChild(div);
      });
    }

    async function openOrderModal(table) {
      currentTable = table;
      document.getElementById("modal-table-name").textContent = table.id;
      document.getElementById("order-modal").classList.remove("hidden");
      order = table.items || [];
      await loadProducts();
      renderOrder();
    }

    function closeModal() {
      document.getElementById("order-modal").classList.add("hidden");
    }

    // Resto de funciones (loadProducts, renderProducts, filterProducts, etc.) se mantienen iguales al anterior

    async function loadProducts() {
      const snap = await db.collection("productos").get();
      allProducts = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
      renderProducts(allProducts);
    }

    function renderProducts(products) {
      const grid = document.getElementById("products-grid");
      grid.innerHTML = "";
      products.forEach(p => {
        const card = document.createElement("div");
        card.className = "bg-white p-5 rounded-3xl border hover:border-[#3E2723] cursor-pointer transition-all active:scale-95 text-center";
        card.innerHTML = `<p class="font-medium">${p.nombre}</p><p class="text-xl font-bold text-[#3E2723]">$${p.precio}</p>`;
        card.onclick = () => addToOrder(p.id, p.nombre, p.precio);
        grid.appendChild(card);
      });
    }

    function filterProducts() {
      const term = document.getElementById("product-search").value.toLowerCase();
      const filtered = allProducts.filter(p => p.nombre.toLowerCase().includes(term));
      renderProducts(filtered);
    }

    function addToOrder(id, nombre, precio) {
      const exist = order.find(i => i.id === id);
      if (exist) exist.cantidad++;
      else order.push({id, nombre, precio, cantidad: 1});
      renderOrder();
    }

    function renderOrder() {
      const list = document.getElementById("order-list");
      list.innerHTML = "";
      let total = 0;
      order.forEach(item => {
        total += item.precio * item.cantidad;
        const li = document.createElement("li");
        li.className = "bg-white p-4 rounded-3xl flex justify-between";
        li.innerHTML = `${item.nombre} ×${item.cantidad} <span class="font-bold">$${(item.precio*item.cantidad)}</span>`;
        list.appendChild(li);
      });
      document.getElementById("total-amount").textContent = total;
    }

    window.guardarMesa = async () => {
      if (!currentTable) return;
      const total = order.reduce((a,b) => a + b.precio * b.cantidad, 0);
      await db.collection("tables").doc(currentTable.id).update({
        items: order,
        total: total,
        status: order.length > 0 ? "ocupada" : "libre"
      });
      alert("✅ Mesa guardada");
      closeModal();
      showZone(currentZone);
    };

    window.limpiarPedido = () => { 
      order = []; 
      renderOrder(); 
    };

    async function cerrarMesa(metodo) {
      if (order.length === 0) return alert("No hay pedido");
      const total = order.reduce((a,b) => a + b.precio * b.cantidad, 0);

      await db.collection("ventas").add({
        mesa: currentTable.id,
        fecha: new Date(),
        total: total,
        metodo: metodo,
        items: order
      });

      await db.collection("tables").doc(currentTable.id).update({ 
        status: "libre", 
        total: 0, 
        items: [] 
      });

      alert(`Mesa ${currentTable.id} cerrada`);
      closeModal();
      showZone(currentZone);
    }

    // Admin con contraseña
    function openAdmin() {
      document.getElementById("admin-modal").classList.remove("hidden");
      document.getElementById("admin-pass").focus();
    }

    function checkAdminPassword() {
      const pass = document.getElementById("admin-pass").value;
      if (pass === "12345678") {
        document.getElementById("admin-modal").classList.add("hidden");
        verVentas();
      } else {
        alert("Contraseña incorrecta");
      }
    }

    async function verVentas() {
      const snap = await db.collection("ventas").orderBy("fecha", "desc").limit(50).get();
      const container = document.getElementById("ventas-list");
      container.innerHTML = "";
      snap.forEach(doc => {
        const v = doc.data();
        const div = document.createElement("div");
        div.className = "bg-gray-50 p-5 rounded-3xl";
        div.innerHTML = `<div class="flex justify-between"><strong>Mesa ${v.mesa}</strong><span class="text-emerald-600">$${v.total}</span></div>
                         <p class="text-xs text-gray-500">${v.fecha.toDate ? v.fecha.toDate().toLocaleString() : v.fecha}</p>`;
        container.appendChild(div);
      });
      document.getElementById("ventas-modal").classList.remove("hidden");
    }

    function closeVentasModal() {
      document.getElementById("ventas-modal").classList.add("hidden");
    }

    function toggleAdmin() { /* ya no se usa */ }

    window.onload = initTables;
  </script>
</body>
</html>
