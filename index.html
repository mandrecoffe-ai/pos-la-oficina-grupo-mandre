<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Oficina Grupo Mandre - POS</title>
  <link rel="stylesheet" href="style.css">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <header>
    <h1>La Oficina Grupo Mandre</h1>
    <div id="user-info">Cajero: Admin</div>
  </header>

  <div class="container">
    <!-- Mapa de Mesas -->
    <section class="floor-plan">
      <h2>Mapa de Mesas</h2>
      <div class="section" id="terraza">
        <h3>Terraza (2 filas de 3)</h3>
        <div class="row"></div>
        <div class="row"></div>
      </div>
      <div class="section" id="interior">
        <h3>Interior</h3>
        <div class="row"></div>
      </div>
      <div class="section" id="barra">
        <h3>Barra</h3>
        <div class="row"></div>
      </div>
    </section>

    <!-- Panel de Productos y Pedido -->
    <section class="pos-panel">
      <h2>Productos</h2>
      <div id="products-list" class="products-grid"></div>

      <h2>Pedido Actual - Mesa <span id="current-table">---</span></h2>
      <ul id="order-list"></ul>
      <div class="total">Total: $<span id="total-amount">0.00</span></div>

      <button onclick="cerrarMesa()">Cerrar Mesa / Facturar</button>
      <button onclick="limpiarPedido()">Limpiar Pedido</button>
    </section>
  </div>

  <!-- Modal para agregar/editar productos -->
  <div id="product-modal" class="modal">
    <div class="modal-content">
      <h2>Gestión de Productos</h2>
      <input type="text" id="prod-name" placeholder="Nombre del producto">
      <input type="number" id="prod-price" placeholder="Precio" step="0.01">
      <input type="number" id="prod-stock" placeholder="Stock inicial" value="100">
      <button onclick="guardarProducto()">Guardar Producto</button>
      <button onclick="closeModal()">Cerrar</button>
    </div>
  </div>

  <button onclick="openProductModal()" class="fab">+ Producto</button>

  <script src="app.js"></script>
</body>
</html>
