<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Oficina Grupo Mandre • POS</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <header>
    <h1>La Oficina Grupo Mandre</h1>
    <button onclick="toggleAdmin()" class="admin-btn">⚙️ Admin</button>
  </header>

  <div class="main">
    <!-- Plano de Mesas -->
    <div class="floor-plan">
      <h2>Salón</h2>
      <div id="floor" class="floor"></div>
    </div>

    <!-- Panel Admin -->
    <div id="admin-panel" class="admin-panel hidden">
      <h2>Gestión de Productos</h2>
      <input type="text" id="prod-name" placeholder="Nombre del producto">
      <input type="number" id="prod-price" placeholder="Precio" step="100">
      <button onclick="guardarProducto()">Guardar Producto</button>
      <hr>
      <h3>Productos</h3>
      <div id="admin-products-list"></div>
    </div>
  </div>

  <!-- Modal Pedido -->
  <div id="order-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Mesa <span id="modal-table-name"></span></h2>
        <button onclick="closeOrderModal()" class="close-btn">✕</button>
      </div>

      <div class="products-grid" id="products-grid"></div>

      <div class="order-summary">
        <h3>Pedido Actual</h3>
        <ul id="order-list"></ul>
        <div class="total">Total: $<span id="total-amount">0</span></div>
      </div>

      <div class="modal-actions">
        <button onclick="limpiarPedido()" class="secondary">Limpiar</button>
        <button onclick="cerrarMesa('Efectivo')" class="primary">💵 Efectivo</button>
        <button onclick="cerrarMesa('QR')" class="primary">📱 QR</button>
        <button onclick="cerrarMesa('Datafono')" class="primary">💳 Datafono</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
