<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Oficina Grupo Mandre • POS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; }
    .table {
      transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
    }
    .table:hover {
      transform: translateY(-8px) scale(1.05);
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
    }
    .modal {
      animation: modalEnter 0.4s ease-out forwards;
    }
    @keyframes modalEnter {
      from { opacity: 0; transform: scale(0.85) translateY(30px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body class="bg-[#F8F4F0] min-h-screen">

  <!-- HEADER -->
  <header class="bg-[#3E2723] text-white py-5 px-6 flex justify-between items-center shadow-xl">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-[#8FBC8F] rounded-2xl flex items-center justify-center text-2xl shadow-inner">☕</div>
      <div>
        <h1 class="text-3xl font-bold tracking-tighter">LA OFICINA</h1>
        <p class="text-xs text-[#8FBC8F] -mt-1 font-medium">Grupo Mandre</p>
      </div>
    </div>
    <button onclick="toggleAdmin()" 
            class="bg-white/10 hover:bg-white/20 px-6 py-3 rounded-3xl text-sm font-medium transition-all active:scale-95">
      ⚙️ Admin
    </button>
  </header>

  <div class="max-w-7xl mx-auto p-6">
    <h2 class="text-2xl font-semibold text-gray-800 mb-8 text-center">Salón</h2>

    <!-- MESAS -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
      <!-- Terraza -->
      <div>
        <h3 class="text-emerald-700 font-semibold mb-4 flex items-center gap-2">
          <span class="w-3 h-3 bg-emerald-500 rounded-full"></span> TERRAZA
        </h3>
        <div id="terraza" class="grid grid-cols-3 gap-4"></div>
      </div>

      <!-- Interior -->
      <div>
        <h3 class="text-amber-700 font-semibold mb-4 flex items-center gap-2">
          <span class="w-3 h-3 bg-amber-500 rounded-full"></span> INTERIOR
        </h3>
        <div id="interior" class="grid grid-cols-3 gap-4"></div>
      </div>

      <!-- Barra -->
      <div>
        <h3 class="text-rose-700 font-semibold mb-4 flex items-center gap-2">
          <span class="w-3 h-3 bg-rose-500 rounded-full"></span> BARRA
        </h3>
        <div id="barra" class="grid grid-cols-3 gap-4"></div>
      </div>
    </div>
  </div>

  <!-- ====================== MODAL PEDIDO (Portal Elegante) ====================== -->
  <div id="order-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4 modal">
    <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden max-h-[95vh] flex flex-col">
      
      <!-- Header Modal -->
      <div class="bg-[#3E2723] text-white px-8 py-6 flex justify-between items-center">
        <div>
          <p class="text-sm opacity-70">Mesa</p>
          <h2 id="modal-table" class="text-4xl font-bold tracking-tighter"></h2>
        </div>
        <button onclick="closeModal()" class="text-4xl leading-none hover:text-gray-300 transition">×</button>
      </div>

      <div class="flex-1 overflow-auto p-6">
        <!-- Productos -->
        <div class="mb-8">
          <h3 class="font-medium text-gray-500 mb-4">Productos</h3>
          <div id="products-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-4"></div>
        </div>

        <!-- Pedido Actual -->
        <div class="bg-gray-50 rounded-3xl p-6">
          <h3 class="font-semibold mb-4 text-lg">Pedido Actual</h3>
          <ul id="order-list" class="space-y-3 min-h-[100px]"></ul>
          
          <div class="mt-8 pt-6 border-t border-gray-200 flex justify-between items-end">
            <span class="text-gray-500">Total</span>
            <span id="total-amount" class="text-4xl font-bold text-[#3E2723]"></span>
          </div>
        </div>
      </div>

      <!-- Botones de Acción -->
      <div class="p-6 border-t grid grid-cols-2 sm:grid-cols-4 gap-3 bg-white">
        <button onclick="limpiarPedido()" 
                class="py-4 border border-gray-300 rounded-2xl font-medium hover:bg-gray-50 transition">
          Limpiar
        </button>
        <button onclick="cerrarMesa('Efectivo')" 
                class="py-4 bg-emerald-600 text-white rounded-2xl font-semibold hover:bg-emerald-700 transition">💵 Efectivo</button>
        <button onclick="cerrarMesa('QR')" 
                class="py-4 bg-blue-600 text-white rounded-2xl font-semibold hover:bg-blue-700 transition">📱 QR</button>
        <button onclick="cerrarMesa('Datafono')" 
                class="py-4 bg-purple-600 text-white rounded-2xl font-semibold hover:bg-purple-700 transition">💳 Datafono</button>
      </div>
    </div>
  </div>

  <!-- ====================== MODAL ADMIN ====================== -->
  <div id="admin-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100] p-4">
    <div class="bg-white rounded-3xl w-full max-w-md p-8">
      <h2 class="text-2xl font-bold mb-6 text-center">Agregar Producto</h2>
      
      <input id="prod-name" type="text" placeholder="Nombre del producto" 
             class="w-full px-5 py-4 border border-gray-200 rounded-2xl mb-4 focus:outline-none focus:border-[#3E2723]">
      
      <input id="prod-price" type="number" placeholder="Precio ($)" step="100"
             class="w-full px-5 py-4 border border-gray-200 rounded-2xl mb-6 focus:outline-none focus:border-[#3E2723]">
      
      <div class="flex gap-3">
        <button onclick="toggleAdmin()" 
                class="flex-1 py-4 border border-gray-300 rounded-2xl font-medium">Cancelar</button>
        <button onclick="guardarProducto()" 
                class="flex-1 py-4 bg-[#3E2723] text-white rounded-2xl font-semibold">Guardar Producto</button>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBzsRQKBh-_P_S8s-4n5qTPYFGbiM_T6OY",
      authDomain: "la-oficina-grupo-mandre.firebaseapp.com",
      projectId: "la-oficina-grupo-mandre",
      storageBucket: "la-oficina-grupo-mandre.firebasestorage.app",
      messagingSenderId: "839406353836",
      appId: "1:839406353836:web:c7df84a66f37ab28e7ce09"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentTable = null;
    let order = [];

    async function initTables() {
      let snapshot = await db.collection("tables").get();
      if (snapshot.empty) {
        const initial = [
          ...Array.from({length:6}, (_,i) => ({id:`T${i+1}`, zone:"terraza", status:"libre", total:0})),
          ...Array.from({length:3}, (_,i) => ({id:`I${i+1}`, zone:"interior", status:"libre", total:0})),
          ...Array.from({length:3}, (_,i) => ({id:`B${i+1}`, zone:"barra",   status:"libre", total:0}))
        ];
        for (let t of initial) await db.collection("tables").doc(t.id).set(t);
        snapshot = await db.collection("tables").get();
      }
      renderTables(snapshot.docs.map(doc => ({id: doc.id, ...doc.data()})));
    }

    function renderTables(tables) {
      const zones = { terraza: "terraza", interior: "interior", barra: "barra" };
      Object.keys(zones).forEach(zone => {
        const container = document.getElementById(zone);
        container.innerHTML = "";
        
        tables.filter(t => t.zone === zone).forEach(table => {
          const div = document.createElement("div");
          div.className = `table aspect-square rounded-3xl flex flex-col items-center justify-center cursor-pointer shadow-md border-4 
            ${table.status === 'libre' ? 
              'bg-white border-emerald-200 hover:border-emerald-400 text-gray-700' : 
              'bg-red-600 text-white border-red-700'}`;
          
          div.innerHTML = `
            <span class="text-5xl font-bold tracking-tighter">${table.id}</span>
            ${table.total > 0 ? `<span class="text-sm mt-1 opacity-90">$${table.total}</span>` : ''}
          `;
          div.onclick = () => openOrderModal(table);
          container.appendChild(div);
        });
      });
    }

    async function openOrderModal(table) {
      currentTable = table;
      document.getElementById("modal-table").textContent = table.id;
      document.getElementById("order-modal").classList.remove("hidden");
      order = [];
      await renderProducts();
      renderOrder();
    }

    function closeModal() {
      document.getElementById("order-modal").classList.add("hidden");
    }

    async function renderProducts() {
      const grid = document.getElementById("products-grid");
      grid.innerHTML = "";
      const snap = await db.collection("productos").get();
      snap.forEach(doc => {
        const p = doc.data();
        const card = document.createElement("div");
        card.className = "bg-white border border-gray-100 hover:border-[#3E2723] rounded-2xl p-5 text-center cursor-pointer transition-all active:scale-95";
        card.innerHTML = `<p class="font-medium">${p.nombre}</p><p class="text-xl font-semibold text-[#3E2723]">$${p.precio}</p>`;
        card.onclick = () => addToOrder(doc.id, p.nombre, p.precio);
        grid.appendChild(card);
      });
    }

    function addToOrder(id, nombre, precio) {
      const exist = order.find(i => i.id === id);
      if (exist) exist.cantidad++;
      else order.push({id, nombre, precio, cantidad: 1});
      renderOrder();
    }

    function renderOrder() {
      const list = document.getElementById("order-list");
      list.innerHTML = "";
      let total = 0;
      order.forEach(item => {
        total += item.precio * item.cantidad;
        const li = document.createElement("li");
        li.className = "flex justify-between bg-white p-4 rounded-2xl";
        li.innerHTML = `${item.nombre} <span class="font-semibold">x${item.cantidad}</span> <span>$${(item.precio*item.cantidad).toFixed(0)}</span>`;
        list.appendChild(li);
      });
      document.getElementById("total-amount").textContent = total.toFixed(0);
    }

    window.limpiarPedido = () => { order = []; renderOrder(); };

    async function cerrarMesa(metodo) {
      if (order.length === 0) return alert("Agrega productos primero");
      const total = order.reduce((a, b) => a + b.precio * b.cantidad, 0);

      await db.collection("ventas").add({ mesa: currentTable.id, total, metodo, fecha: new Date(), items: order });
      await db.collection("tables").doc(currentTable.id).update({ status: "libre", total: 0 });

      alert(`Mesa ${currentTable.id} cerrada correctamente`);
      closeModal();
      initTables();
    }

    function toggleAdmin() {
      document.getElementById("admin-modal").classList.toggle("hidden");
    }

    async function guardarProducto() {
      const nombre = document.getElementById("prod-name").value.trim();
      const precio = parseFloat(document.getElementById("prod-price").value);
      if (!nombre || !precio) return alert("Completa nombre y precio");
      
      await db.collection("productos").add({ nombre, precio });
      alert("Producto guardado");
      document.getElementById("prod-name").value = "";
      document.getElementById("prod-price").value = "";
    }

    window.onload = initTables;
  </script>
</body>
</html>
