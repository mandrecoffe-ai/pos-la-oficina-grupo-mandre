<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Oficina Grupo Mandre • POS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; }
    .mesa {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .mesa:hover {
      transform: translateY(-10px) scale(1.08);
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
    }
    .modal { animation: modalPop 0.4s ease-out; }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.8) translateY(40px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body class="bg-[#F5F2EB] min-h-screen">

  <header class="bg-[#3E2723] text-white py-5 px-6 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-[#8FBC8F] rounded-2xl flex items-center justify-center text-3xl">☕</div>
      <div>
        <h1 class="text-3xl font-bold">LA OFICINA</h1>
        <p class="text-xs text-[#8FBC8F]">Grupo Mandre</p>
      </div>
    </div>
    <button onclick="toggleAdmin()" class="px-6 py-3 bg-white/10 hover:bg-white/20 rounded-3xl text-sm font-medium">⚙️ Admin</button>
  </header>

  <div class="max-w-7xl mx-auto p-6">
    <h2 class="text-center text-2xl font-semibold mb-10 text-gray-800">Mapa de Mesas</h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
      <!-- Terraza -->
      <div>
        <h3 class="text-emerald-700 font-bold mb-4 text-lg">🌳 TERRAZA</h3>
        <div id="terraza" class="grid grid-cols-3 gap-5"></div>
      </div>
      <!-- Interior -->
      <div>
        <h3 class="text-amber-700 font-bold mb-4 text-lg">🏠 INTERIOR</h3>
        <div id="interior" class="grid grid-cols-3 gap-5"></div>
      </div>
      <!-- Barra -->
      <div>
        <h3 class="text-rose-700 font-bold mb-4 text-lg">🍸 BARRA</h3>
        <div id="barra" class="grid grid-cols-3 gap-5"></div>
      </div>
    </div>
  </div>

  <!-- ====================== MODAL DE PEDIDO ====================== -->
  <div id="order-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4 modal">
    <div class="bg-white w-full max-w-4xl rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[95vh]">
      
      <div class="bg-[#3E2723] text-white px-8 py-6 flex justify-between">
        <div>
          <p class="opacity-70 text-sm">Mesa</p>
          <h2 id="modal-table-name" class="text-4xl font-bold"></h2>
        </div>
        <button onclick="closeModal()" class="text-4xl">×</button>
      </div>

      <div class="flex flex-1 overflow-hidden">
        <!-- Columna Izquierda: Productos + Buscador -->
        <div class="w-2/5 border-r p-6 overflow-auto bg-gray-50">
          <input id="product-search" 
                 onkeyup="filterProducts()" 
                 type="text" 
                 placeholder="Buscar producto... (ej: americano)" 
                 class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-6 focus:outline-none focus:border-[#3E2723]">
          
          <div id="products-grid" class="grid grid-cols-2 gap-4"></div>
        </div>

        <!-- Columna Derecha: Pedido Actual -->
        <div class="w-3/5 p-6 flex flex-col">
          <h3 class="font-semibold text-lg mb-4">Pedido Actual</h3>
          <div id="order-list" class="flex-1 overflow-auto space-y-3"></div>
          
          <div class="mt-auto pt-6 border-t">
            <div class="flex justify-between text-3xl font-bold text-[#3E2723]">
              <span>Total:</span>
              <span id="total-amount">$0</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Botones de Pago -->
      <div class="grid grid-cols-4 gap-3 p-6 bg-gray-50 border-t">
        <button onclick="limpiarPedido()" class="py-6 bg-white border-2 border-gray-300 rounded-3xl font-medium hover:bg-gray-100">Limpiar</button>
        <button onclick="cerrarMesa('Efectivo')" class="py-6 bg-emerald-600 text-white rounded-3xl font-semibold hover:bg-emerald-700">💵 Efectivo</button>
        <button onclick="cerrarMesa('QR')" class="py-6 bg-blue-600 text-white rounded-3xl font-semibold hover:bg-blue-700">📱 QR / Nequi</button>
        <button onclick="cerrarMesa('Datafono')" class="py-6 bg-purple-600 text-white rounded-3xl font-semibold hover:bg-purple-700">💳 Datafono</button>
      </div>
    </div>
  </div>

  <!-- ADMIN MODAL -->
  <div id="admin-modal" class="hidden fixed inset-0 bg-black/70 z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl p-8 w-full max-w-md">
      <h2 class="text-2xl font-bold mb-6">Nuevo Producto</h2>
      <input id="prod-name" placeholder="Nombre del producto" class="w-full p-4 border rounded-2xl mb-4">
      <input id="prod-price" type="number" placeholder="Precio" class="w-full p-4 border rounded-2xl mb-6">
      <div class="flex gap-3">
        <button onclick="toggleAdmin()" class="flex-1 py-4 border rounded-2xl">Cancelar</button>
        <button onclick="guardarProducto()" class="flex-1 py-4 bg-[#3E2723] text-white rounded-2xl">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = { /* tu configuración actual */ 
      apiKey: "AIzaSyBzsRQKBh-_P_S8s-4n5qTPYFGbiM_T6OY",
      authDomain: "la-oficina-grupo-mandre.firebaseapp.com",
      projectId: "la-oficina-grupo-mandre",
      storageBucket: "la-oficina-grupo-mandre.firebasestorage.app",
      messagingSenderId: "839406353836",
      appId: "1:839406353836:web:c7df84a66f37ab28e7ce09"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentTable = null;
    let order = [];
    let allProducts = [];

    async function initTables() {
      let snap = await db.collection("tables").get();
      if (snap.empty) {
        const inicial = [
          ...Array.from({length:6}, (_,i)=>({id:`T${i+1}`, zone:"terraza", status:"libre", total:0})),
          ...Array.from({length:3}, (_,i)=>({id:`I${i+1}`, zone:"interior", status:"libre", total:0})),
          ...Array.from({length:3}, (_,i)=>({id:`B${i+1}`, zone:"barra", status:"libre", total:0}))
        ];
        for (let t of inicial) await db.collection("tables").doc(t.id).set(t);
      }
      loadTables();
    }

    async function loadTables() {
      const snap = await db.collection("tables").get();
      const tables = snap.docs.map(d => ({id: d.id, ...d.data()}));
      renderTables(tables);
    }

    function renderTables(tables) {
      ["terraza","interior","barra"].forEach(zone => {
        const cont = document.getElementById(zone);
        cont.innerHTML = "";
        tables.filter(t => t.zone === zone).forEach(table => {
          const div = document.createElement("div");
          div.className = `mesa aspect-square rounded-3xl flex flex-col items-center justify-center cursor-pointer border-4 shadow-lg
            ${table.status === 'libre' ? 'bg-white border-emerald-300 text-gray-700' : 'bg-red-600 text-white border-red-700'}`;
          div.innerHTML = `
            <span class="text-5xl font-bold">${table.id}</span>
            ${table.total > 0 ? `<span class="mt-2 text-lg font-semibold">$${table.total}</span>` : ''}
          `;
          div.onclick = () => openOrderModal(table);
          cont.appendChild(div);
        });
      });
    }

    async function openOrderModal(table) {
      currentTable = table;
      document.getElementById("modal-table-name").textContent = table.id;
      document.getElementById("order-modal").classList.remove("hidden");
      order = [];
      await loadProducts();
      renderOrder();
    }

    function closeModal() {
      document.getElementById("order-modal").classList.add("hidden");
    }

    async function loadProducts() {
      const snap = await db.collection("productos").get();
      allProducts = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
      renderProducts(allProducts);
    }

    function renderProducts(products) {
      const grid = document.getElementById("products-grid");
      grid.innerHTML = "";
      products.forEach(p => {
        const card = document.createElement("div");
        card.className = "bg-white p-5 rounded-2xl border border-gray-100 hover:border-[#3E2723] cursor-pointer transition-all active:scale-95";
        card.innerHTML = `<p class="font-medium">${p.nombre}</p><p class="text-xl font-bold text-[#3E2723]">$${p.precio}</p>`;
        card.onclick = () => addToOrder(p.id, p.nombre, p.precio);
        grid.appendChild(card);
      });
    }

    function filterProducts() {
      const term = document.getElementById("product-search").value.toLowerCase();
      const filtered = allProducts.filter(p => p.nombre.toLowerCase().includes(term));
      renderProducts(filtered);
    }

    function addToOrder(id, nombre, precio) {
      const exist = order.find(i => i.id === id);
      if (exist) exist.cantidad++;
      else order.push({id, nombre, precio, cantidad: 1});
      renderOrder();
    }

    function renderOrder() {
      const list = document.getElementById("order-list");
      list.innerHTML = "";
      let total = 0;
      order.forEach(item => {
        total += item.precio * item.cantidad;
        const li = document.createElement("li");
        li.className = "bg-white p-4 rounded-2xl flex justify-between items-center";
        li.innerHTML = `${item.nombre} <span class="font-semibold">x${item.cantidad}</span> <span class="font-bold">$${(item.precio*item.cantidad)}</span>`;
        list.appendChild(li);
      });
      document.getElementById("total-amount").textContent = total;
    }

    window.limpiarPedido = () => { order = []; renderOrder(); };

    async function cerrarMesa(metodo) {
      if (order.length === 0) return alert("Agrega productos");
      const total = order.reduce((a,b) => a + b.precio * b.cantidad, 0);

      await db.collection("ventas").add({mesa: currentTable.id, total, metodo, fecha: new Date(), items: order});
      await db.collection("tables").doc(currentTable.id).update({status: "libre", total: 0});

      alert(`Mesa ${currentTable.id} cerrada por ${metodo}`);
      closeModal();
      loadTables();
    }

    function toggleAdmin() {
      document.getElementById("admin-modal").classList.toggle("hidden");
    }

    async function guardarProducto() {
      const nombre = document.getElementById("prod-name").value.trim();
      const precio = parseFloat(document.getElementById("prod-price").value);
      if (!nombre || !precio) return alert("Completa los campos");
      await db.collection("productos").add({nombre, precio});
      alert("Producto guardado");
      document.getElementById("prod-name").value = "";
      document.getElementById("prod-price").value = "";
    }

    window.onload = initTables;
  </script>
</body>
</html>
