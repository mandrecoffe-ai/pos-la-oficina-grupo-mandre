<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Oficina Grupo Mandre • POS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; background: #F8F1E9; }
    .mesa {
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
    }
    .mesa:hover {
      transform: translateY(-12px) scale(1.08);
    }
    .mesa-libre { background: linear-gradient(#E8F5E9, #C8E6C9); border-color: #4ADE80; }
    .mesa-ocupada { background: linear-gradient(#FEE2E2, #FCA5A5); border-color: #EF4444; }
    .modal { animation: modalPop 0.4s ease-out forwards; }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.8) translateY(40px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body>

  <header class="bg-[#3E2723] text-white py-5 px-6 flex justify-between items-center shadow-xl">
    <div class="flex items-center gap-3">
      <div class="w-11 h-11 bg-[#8FBC8F] rounded-3xl flex items-center justify-center text-3xl shadow-inner">☕</div>
      <div>
        <h1 class="text-3xl font-bold tracking-tighter">LA OFICINA</h1>
        <p class="text-xs text-[#A8C4A8]">Grupo Mandre</p>
      </div>
    </div>
    <button onclick="toggleAdmin()" class="px-6 py-3 bg-white/10 hover:bg-white/20 rounded-3xl text-sm font-medium">⚙️ Admin</button>
  </header>

  <div class="max-w-7xl mx-auto p-6">
    <h2 class="text-center text-2xl font-medium text-gray-700 mb-10">Salón</h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
      <div>
        <h3 class="text-emerald-700 font-semibold mb-5"> Terraza</h3>
        <div id="terraza" class="grid grid-cols-3 gap-6"></div>
      </div>
      <div>
        <h3 class="text-amber-700 font-semibold mb-5"> Interior</h3>
        <div id="interior" class="grid grid-cols-3 gap-6"></div>
      </div>
      <div>
        <h3 class="text-rose-700 font-semibold mb-5"> Barra</h3>
        <div id="barra" class="grid grid-cols-3 gap-6"></div>
      </div>
    </div>
  </div>

  <!-- MODAL PEDIDO -->
  <div id="order-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 modal">
    <div class="bg-white w-full max-w-4xl rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[95vh]">
      <div class="bg-[#3E2723] text-white px-8 py-6 flex justify-between">
        <div>
          <p class="text-sm opacity-75">Mesa</p>
          <h2 id="modal-table-name" class="text-4xl font-bold"></h2>
        </div>
        <button onclick="closeModal()" class="text-5xl leading-none hover:text-gray-300">×</button>
      </div>

      <div class="flex flex-1 overflow-hidden">
        <!-- Productos -->
        <div class="w-1/2 border-r p-6 overflow-auto bg-gray-50">
          <input id="product-search" onkeyup="filterProducts()" placeholder="Buscar producto..." 
                 class="w-full px-5 py-4 border rounded-3xl mb-6 focus:outline-none">
          <div id="products-grid" class="grid grid-cols-2 gap-4"></div>
        </div>

        <!-- Pedido Actual -->
        <div class="w-1/2 p-6 flex flex-col">
          <h3 class="font-semibold mb-4">Pedido Actual</h3>
          <div id="order-list" class="flex-1 overflow-auto space-y-3"></div>
          
          <div class="mt-auto pt-6 border-t text-3xl font-bold flex justify-between text-[#3E2723]">
            <span>Total:</span>
            <span id="total-amount">$0</span>
          </div>
        </div>
      </div>

      <!-- Botones de Acción -->
      <div class="p-6 grid grid-cols-2 md:grid-cols-5 gap-3 bg-gray-50 border-t">
        <button onclick="guardarMesa()" class="py-6 bg-amber-500 text-white rounded-3xl font-semibold hover:bg-amber-600">💾 Guardar Mesa</button>
        <button onclick="limpiarPedido()" class="py-6 border border-gray-300 rounded-3xl font-medium hover:bg-gray-100">Limpiar</button>
        <button onclick="cerrarMesa('Efectivo')" class="py-6 bg-emerald-600 text-white rounded-3xl font-semibold hover:bg-emerald-700">💵 Efectivo</button>
        <button onclick="cerrarMesa('QR')" class="py-6 bg-blue-600 text-white rounded-3xl font-semibold hover:bg-blue-700">📱 QR</button>
        <button onclick="cerrarMesa('Datafono')" class="py-6 bg-purple-600 text-white rounded-3xl font-semibold hover:bg-purple-700">💳 Datafono</button>
      </div>
    </div>
  </div>

  <!-- ADMIN MODAL -->
  <div id="admin-modal" class="hidden fixed inset-0 bg-black/70 z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl p-8 w-full max-w-md">
      <h2 class="text-2xl font-bold mb-6 text-center">Agregar Producto</h2>
      <input id="prod-name" placeholder="Nombre del producto" class="w-full p-4 border rounded-3xl mb-4">
      <input id="prod-price" type="number" placeholder="Precio" class="w-full p-4 border rounded-3xl mb-6">
      <button onclick="guardarProducto()" class="w-full py-4 bg-[#3E2723] text-white rounded-3xl font-medium">Guardar Producto</button>
      <button onclick="toggleAdmin()" class="w-full mt-3 py-4 text-gray-500">Cerrar</button>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBzsRQKBh-_P_S8s-4n5qTPYFGbiM_T6OY",
      authDomain: "la-oficina-grupo-mandre.firebaseapp.com",
      projectId: "la-oficina-grupo-mandre",
      storageBucket: "la-oficina-grupo-mandre.firebasestorage.app",
      messagingSenderId: "839406353836",
      appId: "1:839406353836:web:c7df84a66f37ab28e7ce09"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentTable = null;
    let order = [];
    let allProducts = [];

    async function initTables() {
      let snap = await db.collection("tables").get();
      if (snap.empty) {
        const inicial = [
          ...Array.from({length:6}, (_,i) => ({id:`T${i+1}`, zone:"terraza", status:"libre", total:0, items:[]})),
          ...Array.from({length:3}, (_,i) => ({id:`I${i+1}`, zone:"interior", status:"libre", total:0, items:[]})),
          ...Array.from({length:3}, (_,i) => ({id:`B${i+1}`, zone:"barra", status:"libre", total:0, items:[]}))
        ];
        for (let t of inicial) await db.collection("tables").doc(t.id).set(t);
      }
      loadTables();
    }

    async function loadTables() {
      const snap = await db.collection("tables").get();
      const tables = snap.docs.map(d => ({id: d.id, ...d.data()}));
      renderTables(tables);
    }

    function renderTables(tables) {
      ["terraza","interior","barra"].forEach(zone => {
        const cont = document.getElementById(zone);
        cont.innerHTML = "";
        tables.filter(t => t.zone === zone).forEach(table => {
          const div = document.createElement('div');
          div.className = `mesa aspect-square rounded-3xl flex flex-col items-center justify-center cursor-pointer border-4 text-center
            ${table.status === 'libre' ? 'mesa-libre' : 'mesa-ocupada'}`;
          div.innerHTML = `
            <span class="text-5xl font-bold tracking-tighter">${table.id}</span>
            ${table.total > 0 ? `<span class="text-xl font-semibold mt-2">$${table.total}</span>` : ''}
          `;
          div.onclick = () => openOrderModal(table);
          cont.appendChild(div);
        });
      });
    }

    async function openOrderModal(table) {
      currentTable = table;
      document.getElementById("modal-table-name").textContent = table.id;
      document.getElementById("order-modal").classList.remove("hidden");
      order = table.items || [];
      await loadProducts();
      renderOrder();
    }

    function closeModal() {
      document.getElementById("order-modal").classList.add("hidden");
    }

    async function loadProducts() {
      const snap = await db.collection("productos").get();
      allProducts = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
      renderProducts(allProducts);
    }

    function renderProducts(products) {
      const grid = document.getElementById("products-grid");
      grid.innerHTML = "";
      products.forEach(p => {
        const card = document.createElement("div");
        card.className = "bg-white p-5 rounded-3xl border hover:border-[#3E2723] cursor-pointer transition-all active:scale-95 text-center";
        card.innerHTML = `<p class="font-medium">${p.nombre}</p><p class="text-xl font-bold text-[#3E2723]">$${p.precio}</p>`;
        card.onclick = () => addToOrder(p.id, p.nombre, p.precio);
        grid.appendChild(card);
      });
    }

    function filterProducts() {
      const term = document.getElementById("product-search").value.toLowerCase();
      const filtered = allProducts.filter(p => p.nombre.toLowerCase().includes(term));
      renderProducts(filtered);
    }

    function addToOrder(id, nombre, precio) {
      const exist = order.find(i => i.id === id);
      if (exist) exist.cantidad++;
      else order.push({id, nombre, precio, cantidad: 1});
      renderOrder();
    }

    function renderOrder() {
      const list = document.getElementById("order-list");
      list.innerHTML = "";
      let total = 0;
      order.forEach(item => {
        total += item.precio * item.cantidad;
        const li = document.createElement("li");
        li.className = "bg-white p-4 rounded-3xl flex justify-between items-center";
        li.innerHTML = `${item.nombre} ×${item.cantidad} <span class="font-bold">$${(item.precio*item.cantidad)}</span>`;
        list.appendChild(li);
      });
      document.getElementById("total-amount").textContent = total;
    }

    window.guardarMesa = async () => {
      if (!currentTable) return;
      const total = order.reduce((a,b) => a + b.precio * b.cantidad, 0);
      await db.collection("tables").doc(currentTable.id).update({
        items: order,
        total: total,
        status: "ocupada"
      });
      alert("Mesa guardada correctamente");
      closeModal();
      loadTables();
    };

    window.limpiarPedido = () => { order = []; renderOrder(); };

    async function cerrarMesa(metodo) {
      if (order.length === 0) return alert("No hay pedido");

      let cliente = "";
      if (metodo === "QR" || metodo === "Datafono") {
        cliente = prompt("Nombre del cliente o ID de transacción:");
        if (!cliente) return;
      }

      const total = order.reduce((a,b) => a + b.precio * b.cantidad, 0);

      await db.collection("ventas").add({
        mesa: currentTable.id,
        fecha: new Date(),
        total: total,
        metodo: metodo,
        cliente: cliente || "Efectivo",
        items: order
      });

      await db.collection("tables").doc(currentTable.id).update({ 
        status: "libre", 
        total: 0, 
        items: [] 
      });

      alert(`Mesa ${currentTable.id} cerrada por ${metodo}`);
      closeModal();
      loadTables();
    }

    function toggleAdmin() {
      document.getElementById("admin-modal").classList.toggle("hidden");
    }

    async function guardarProducto() {
      const nombre = document.getElementById("prod-name").value.trim();
      const precio = parseFloat(document.getElementById("prod-price").value);
      if (!nombre || !precio) return alert("Completa los campos");
      await db.collection("productos").add({nombre, precio});
      alert("Producto guardado");
    }

    window.onload = initTables;
  </script>
</body>
</html>
