<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>La Oficina Grupo Mandre • POS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; background: #F9F7F2; }
    .mesa {
      width: 105px;
      height: 105px;
      border-radius: 9999px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.4s ease;
      border: 4px solid;
      box-shadow: 0 10px 20px -5px rgb(0 0 0 / 0.15);
    }
    .mesa:hover { transform: scale(1.15); }
    .mesa-libre { background: #F0F7F4; border-color: #86E8B8; color: #1C3D2F; }
    .mesa-ocupada { background: #FFF0F0; border-color: #FF9B9B; color: #5C1F1F; }
    .modal { animation: modalPop 0.4s ease-out forwards; }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.9) translateY(40px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body class="min-h-screen">

  <!-- HEADER -->
  <header class="bg-[#1E2A3C] text-white py-5 px-6 flex justify-between items-center shadow-xl">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-[#4ECDC4] rounded-3xl flex items-center justify-center text-3xl shadow-inner">☕</div>
      <h1 class="text-3xl font-light tracking-tighter">La Oficina</h1>
    </div>
    <button onclick="openAdmin()" class="px-6 py-3 bg-white/10 hover:bg-white/20 rounded-3xl text-sm font-medium">⚙️ Admin</button>
  </header>

  <div class="max-w-6xl mx-auto p-6">
    <!-- Tabs -->
    <div class="flex justify-center gap-4 mb-10 overflow-x-auto pb-2">
      <button onclick="showZone('terraza')" id="tab-terraza" class="tab-btn px-8 py-3 rounded-3xl font-medium active">🌳 Terraza</button>
      <button onclick="showZone('interior')" id="tab-interior" class="tab-btn px-8 py-3 rounded-3xl font-medium">🏠 Interior</button>
      <button onclick="showZone('barra')" id="tab-barra" class="tab-btn px-8 py-3 rounded-3xl font-medium">🍷 Barra</button>
    </div>

    <!-- Mesas -->
    <div id="zona-terraza" class="grid grid-cols-3 md:grid-cols-6 gap-8 justify-items-center"></div>
    <div id="zona-interior" class="grid grid-cols-3 md:grid-cols-6 gap-8 justify-items-center hidden"></div>
    <div id="zona-barra" class="grid grid-cols-3 md:grid-cols-6 gap-8 justify-items-center hidden"></div>
  </div>

  <!-- MODAL PEDIDO (Estilo grande y bonito como index 11) -->
  <div id="order-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 modal p-4">
    <div class="bg-white w-full max-w-4xl rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[95vh]">
      <div class="bg-[#1E2A3C] text-white px-8 py-6 flex justify-between items-center">
        <h2 id="modal-table-name" class="text-4xl font-light"></h2>
        <button onclick="closeModal()" class="text-4xl leading-none">×</button>
      </div>

      <div class="flex flex-col md:flex-row flex-1 overflow-hidden">
        <!-- Productos -->
        <div class="md:w-3/5 p-6 overflow-auto bg-gray-50 border-b md:border-r">
          <input id="product-search" onkeyup="filterProducts()" placeholder="Buscar producto..." 
                 class="w-full px-5 py-4 border rounded-3xl mb-6 focus:outline-none">
          <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
        </div>

        <!-- Pedido -->
        <div class="md:w-2/5 p-6 flex flex-col">
          <h3 class="font-medium mb-4 text-lg">Pedido Actual</h3>
          <div id="order-list" class="flex-1 overflow-auto space-y-3"></div>
          <div class="mt-auto pt-6 border-t text-3xl font-light flex justify-between text-[#1E2A3C]">
            <span>Total</span>
            <span id="total-amount">$0</span>
          </div>
        </div>
      </div>

      <div class="p-6 grid grid-cols-2 md:grid-cols-5 gap-3 bg-gray-50 border-t">
        <button onclick="guardarMesa()" class="py-6 bg-amber-500 text-white rounded-3xl font-medium">💾 Guardar Mesa</button>
        <button onclick="limpiarPedido()" class="py-6 border border-gray-300 rounded-3xl font-medium">Limpiar</button>
        <button onclick="cerrarMesa('Efectivo')" class="py-6 bg-emerald-600 text-white rounded-3xl font-medium">💵 Efectivo</button>
        <button onclick="cerrarMesa('QR')" class="py-6 bg-blue-600 text-white rounded-3xl font-medium">📱 QR</button>
        <button onclick="cerrarMesa('Credito')" class="py-6 bg-purple-600 text-white rounded-3xl font-medium">📋 Crédito</button>
      </div>
    </div>
  </div>

  <!-- ADMIN MENU -->
  <div id="admin-modal" class="hidden fixed inset-0 bg-black/70 z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl p-8 w-full max-w-md">
      <h2 class="text-2xl font-light mb-8 text-center">Administración</h2>
      <button onclick="showAddProductModal()" class="w-full py-5 border rounded-3xl mb-3 hover:bg-gray-50">Agregar Producto</button>
      <button onclick="verVentas()" class="w-full py-5 border rounded-3xl mb-3 hover:bg-gray-50">Ver Ventas</button>
      <button onclick="closeAdminModal()" class="w-full mt-6 py-4 text-gray-400">Cerrar</button>
    </div>
  </div>

  <!-- Agregar Producto -->
  <div id="add-product-modal" class="hidden fixed inset-0 bg-black/70 z-[110] flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl p-8 w-full max-w-md">
      <h2 class="text-xl font-light mb-6">Nuevo Producto</h2>
      <input id="prod-name" placeholder="Nombre del producto" class="w-full p-4 border rounded-3xl mb-4">
      <input id="prod-price" type="number" placeholder="Precio" class="w-full p-4 border rounded-3xl mb-8">
      <button onclick="guardarProducto()" class="w-full py-5 bg-[#1E2A3C] text-white rounded-3xl">Guardar</button>
      <button onclick="closeAddProductModal()" class="w-full mt-4 py-4 text-gray-400">Cancelar</button>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBzsRQKBh-_P_S8s-4n5qTPYFGbiM_T6OY",
      authDomain: "la-oficina-grupo-mandre.firebaseapp.com",
      projectId: "la-oficina-grupo-mandre",
      storageBucket: "la-oficina-grupo-mandre.firebasestorage.app",
      messagingSenderId: "839406353836",
      appId: "1:839406353836:web:c7df84a66f37ab28e7ce09"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentTable = null;
    let order = [];
    let allProducts = [];
    let currentZone = 'terraza';

    async function initTables() {
      let snap = await db.collection("tables").get();
      if (snap.empty) {
        const inicial = [
          ...Array.from({length:6}, (_,i) => ({id:`T${i+1}`, zone:"terraza", status:"libre", total:0, items:[]})),
          ...Array.from({length:3}, (_,i) => ({id:`I${i+1}`, zone:"interior", status:"libre", total:0, items:[]})),
          ...Array.from({length:3}, (_,i) => ({id:`B${i+1}`, zone:"barra", status:"libre", total:0, items:[]}))
        ];
        for (let t of inicial) await db.collection("tables").doc(t.id).set(t);
      }
      showZone('terraza');
    }

    function showZone(zone) {
      currentZone = zone;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'bg-[#1E2A3C]', 'text-white'));
      document.getElementById(`tab-${zone}`).classList.add('active', 'bg-[#1E2A3C]', 'text-white');

      ['terraza','interior','barra'].forEach(z => {
        document.getElementById(`zona-${z}`).classList.toggle('hidden', z !== zone);
      });
      loadAndRenderZone(zone);
    }

    async function loadAndRenderZone(zone) {
      const snap = await db.collection("tables").get();
      const tables = snap.docs.map(d => ({id: d.id, ...d.data()}));
      const container = document.getElementById(`zona-${zone}`);
      container.innerHTML = "";

      tables.filter(t => t.zone === zone).forEach(table => {
        const div = document.createElement('div');
        div.className = `mesa ${table.status === 'libre' ? 'mesa-libre' : 'mesa-ocupada'}`;
        div.innerHTML = `
          <span class="text-4xl font-light">${table.id}</span>
          ${table.total > 0 ? `<span class="text-base font-medium mt-1">$${table.total}</span>` : ''}
        `;
        div.onclick = () => openOrderModal(table);
        container.appendChild(div);
      });
    }

    async function openOrderModal(table) {
      currentTable = table;
      document.getElementById("modal-table-name").textContent = table.id;
      document.getElementById("order-modal").classList.remove("hidden");
      order = table.items || [];
      await loadProducts();
      renderOrder();
    }

    function closeModal() {
      document.getElementById("order-modal").classList.add("hidden");
    }

    async function loadProducts() {
      const snap = await db.collection("productos").get();
      allProducts = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
      renderProducts(allProducts);
    }

    function renderProducts(products) {
      const grid = document.getElementById("products-grid");
      grid.innerHTML = "";
      products.forEach(p => {
        const card = document.createElement("div");
        card.className = "bg-white p-5 rounded-3xl border hover:border-[#1E2A3C] cursor-pointer transition-all active:scale-95 text-center";
        card.innerHTML = `<p class="font-light">${p.nombre}</p><p class="text-xl font-medium text-[#1E2A3C]">$${p.precio}</p>`;
        card.onclick = () => addToOrder(p.id, p.nombre, p.precio);
        grid.appendChild(card);
      });
    }

    function filterProducts() {
      const term = document.getElementById("product-search").value.toLowerCase();
      const filtered = allProducts.filter(p => p.nombre.toLowerCase().includes(term));
      renderProducts(filtered);
    }

    function addToOrder(id, nombre, precio) {
      const exist = order.find(i => i.id === id);
      if (exist) exist.cantidad++;
      else order.push({id, nombre, precio, cantidad: 1});
      renderOrder();
    }

    function renderOrder() {
      const list = document.getElementById("order-list");
      list.innerHTML = "";
      let total = 0;
      order.forEach(item => {
        total += item.precio * item.cantidad;
        const li = document.createElement("li");
        li.className = "bg-white p-4 rounded-3xl flex justify-between items-center";
        li.innerHTML = `${item.nombre} ×${item.cantidad} <span class="font-medium">$${(item.precio*item.cantidad)}</span>`;
        list.appendChild(li);
      });
      document.getElementById("total-amount").textContent = total;
    }

    window.guardarMesa = async () => {
      if (!currentTable) return;
      const total = order.reduce((a,b) => a + b.precio * b.cantidad, 0);
      await db.collection("tables").doc(currentTable.id).update({
        items: order,
        total: total,
        status: order.length > 0 ? "ocupada" : "libre"
      });
      alert("✅ Mesa guardada");
      closeModal();
      showZone(currentZone);
    };

    window.limpiarPedido = () => { order = []; renderOrder(); };

    async function cerrarMesa(metodo) {
      if (order.length === 0) return alert("No hay pedido");
      const total = order.reduce((a,b) => a + b.precio * b.cantidad, 0);

      await db.collection("ventas").add({
        mesa: currentTable.id,
        fecha: new Date(),
        total: total,
        metodo: metodo,
        items: order
      });

      await db.collection("tables").doc(currentTable.id).update({ 
        status: "libre", 
        total: 0, 
        items: [] 
      });

      alert(`Mesa ${currentTable.id} cerrada`);
      closeModal();
      showZone(currentZone);
    }

    function openAdmin() {
      document.getElementById("admin-modal").classList.remove("hidden");
    }

    function closeAdminModal() {
      document.getElementById("admin-modal").classList.add("hidden");
    }

    function showAddProductModal() {
      closeAdminModal();
      document.getElementById("add-product-modal").classList.remove("hidden");
    }

    function closeAddProductModal() {
      document.getElementById("add-product-modal").classList.add("hidden");
    }

    async function guardarProducto() {
      const nombre = document.getElementById("prod-name").value.trim();
      const precio = parseFloat(document.getElementById("prod-price").value);
      if (!nombre || !precio) return alert("Completa los campos");
      await db.collection("productos").add({nombre, precio});
      alert("Producto guardado");
      closeAddProductModal();
    }

    async function verVentas() {
      closeAdminModal();
      const snap = await db.collection("ventas").orderBy("fecha", "desc").limit(30).get();
      let html = "";
      snap.forEach(doc => {
        const v = doc.data();
        html += `<div class="bg-gray-50 p-5 rounded-3xl"><strong>Mesa ${v.mesa}</strong> — $${v.total} (${v.metodo})</div>`;
      });
      alert("Historial de ventas (ver en consola por ahora para no complicar)");
      console.table(snap.docs.map(d => d.data()));
    }

    window.onload = initTables;
  </script>
</body>
</html>
